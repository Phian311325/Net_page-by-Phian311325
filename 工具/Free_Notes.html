<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由筆記</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: "Noto Sans TC";
    }
    .container {
      width: 100%;
      max-width: 1000px;
      background:#f5f5f5;
      border-radius: 0px;
      overflow: hidden;
      min-height: 90vh;
      padding: 10px;
    }
    body {
      padding: 2vw;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    textarea {
      height: 75vh;
      width: 100%;
      margin: 0 0 15px 0;
      padding: 15px;
      font-size: 16px;
      border: 2px solid #00000080;
      text-align: left;
      resize: none;
      border-radius: 0px;
    }
    textarea:focus {
      outline: none;
      border-color: #000;
      border: 2px solid #000;
      box-shadow: 0 0 0 2px #00000080;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      font-size: 16px;
      border: 2px solid #000;
      border-bottom: 6px solid #999;
      transition: all 100ms ease;
      cursor: pointer;
      border-radius: 1px;
      background-color: #fff;
    }
    button:hover {
      background-color: #f8f8f8ff;
    }
    button:active {
      border-bottom: 2px solid #000;
      margin-top: 4px;
    }
    .save-status {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }
    /* 隐藏文件输入框 */
    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <textarea id="text-area" placeholder="請輸入筆記內容…"></textarea>
    
    <div class="btn-group">
      <button id="import-btn">導入筆記</button>
      <button id="export-btn">導出筆記</button>
      <button id="clear-btn">清空筆記</button>
    </div>
    
    <div class="save-status" id="save-status">已自動保存</div>
    <!-- 文件输入框（隐藏） -->
    <input type="file" id="file-input" accept=".txt">
  </div>

  <script>
    const textArea = document.getElementById("text-area");
    const exportBtn = document.getElementById("export-btn");
    const clearBtn = document.getElementById("clear-btn");
    const saveStatus = document.getElementById("save-status");
    const importBtn = document.getElementById("import-btn");
    const fileInput = document.getElementById("file-input");

    // 页面加载时读取笔记
    function loadNote() {
      const savedNote = localStorage.getItem("freeNote");
      if (savedNote) textArea.value = savedNote;
    }

    // 保存笔记
    function saveNote() {
      localStorage.setItem("freeNote", textArea.value);
      saveStatus.textContent = "✓ 已自动保存";
      saveStatus.style.color = "#28a745";
      setTimeout(() => {
        saveStatus.textContent = "已自动保存";
        saveStatus.style.color = "#666";
      }, 1000);
    }

    // 导出笔记
    function exportNote() {
      const noteContent = textArea.value.trim();
      if (!noteContent) {
        alert("筆記內容為空，無法導出!");
        return;
      }
      const defaultFileName = `我的笔记_${new Date().toLocaleDateString()}.txt`;
      const fileName = prompt("起輸入導出文件名（無需加.txt）：", defaultFileName.replace(".txt", ""));
      
      if (fileName === null) return;
      const blob = new Blob([noteContent], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${fileName}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // 清空笔记
    function clearNote() {
      if (textArea.value.trim() === "") {
        alert("筆記已為空!");
        return;
      }
      if (confirm("確定清空筆記內容？（清空後無法恢復）")) {
        textArea.value = "";
        saveNote();
      }
    }

    // 导入笔记
    function importNote() {
      // 检查当前是否有内容，避免覆盖
      if (textArea.value.trim() !== "") {
        if (!confirm("當前已有筆記內容，導入將覆蓋現有內容，是否繼續？")) {
          return;
        }
      }
      // 触发文件选择对话框
      fileInput.click();
    }

    // 处理文件导入
    function handleFileImport(event) {
      const file = event.target.files[0];
      if (!file) return;

      // 验证文件类型
      if (!file.name.endsWith(".txt")) {
        alert("請選擇txt格式的文件！");
        fileInput.value = ""; // 重置输入框，允许重新选择
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          textArea.value = e.target.result;
          saveNote(); // 导入后自动保存
          alert("導入成功！");
        } catch (error) {
          alert("導入失敗：" + error.message);
        }
      };
      reader.readAsText(file, "utf-8");
      fileInput.value = ""; // 重置输入框，允许重复导入同一文件
    }

    // 绑定事件
    window.addEventListener("load", loadNote);
    textArea.addEventListener("input", saveNote);
    exportBtn.addEventListener("click", exportNote);
    clearBtn.addEventListener("click", clearNote);
    importBtn.addEventListener("click", importNote);
    fileInput.addEventListener("change", handleFileImport);
    window.addEventListener("beforeunload", saveNote);
  </script>
</body>
</html>
