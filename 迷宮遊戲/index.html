<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宮遊戲</title>
    <link rel="Icon" href="./image/迷宮.png">
    <style>
        * {
            font-family: "Noto Sans TC";
            text-shadow: 1px 1px #00000033;
            user-select: none;
        }

        body {
            background-color: #fff8ddff;
            margin: 0;
            padding: 8px;
            justify-items: center;
            cursor: default;
        }
        h1 {
            margin: 8px;
            font-size: 32px;
        }
        div {
            font-size: 20px;
        }
        button {
            background-color: #00a0ffff;
            padding: 2px 16px;
            margin: 8px;
            font-size: 16px;
            height: 38px;
            border: 2px solid #0078c0ff;
            border-bottom: 8px solid #0099d0ff;
        }
        button:active {
            height: 32px;
            border-bottom: 2px solid #0078c0ff;;
        }

        .Game-Canvas {
            display: block;
            margin: 8px auto;
        }
        .Col-L {
            display: flex;
            gap: 16px;
            align-items: end;
        }

        .Value-Bar {
            padding: 4px 16px;
            margin: 8px;
            background: linear-gradient(to right, #00a0ffff 50%, #80808033 50%);
        }
    </style>
</head>
<body>
    <h1>[迷宮遊戲 | By: PhianNaloE]</h1>
    <div class="Col-L">
        <div class="Value-Bar" id="maze-size-bar">迷宮尺寸: 15</div>
        <div class="Value-Bar" id="random-rate-bar">Random rate: 0.5</div>
        <button id="create-btn">開始遊戲</button>
        <button id="reset-btn">重置位置</button>
    </div>
    <canvas class="Game-Canvas" id="game-canvas" width="750" height="750"></canvas>
    <script>
        const Well_Img = new Image();
        Well_Img.src = "./image/牆壁.png";
        const Road_Img = new Image();
        Road_Img.src = "./image/地板.png";
        const Start_Img = new Image();
        Start_Img.src = "./image/起點.png";
        const End_Img = new Image();
        End_Img.src = "./image/終點.png";
        const User_Img = new Image();
        User_Img.src = "./image/微笑方塊.png";
        
        setTimeout(() => {
            const maze_size_bar = document.getElementById("maze-size-bar");
            const random_rate_bar = document.getElementById("random-rate-bar");
            const create_btn = document.getElementById("create-btn");
            const reset_btn = document.getElementById("reset-btn");
            const game_canvas = document.getElementById("game-canvas");

            const ctx = game_canvas.getContext('2d');
            ctx.font = "bold 48px 'Noto Sans TC'" 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            function CreateRandomMaze(size, randomRate) {
                function CreateBaseMaze() {
                    const BASE_MAZE = Array(trueSize).fill().map(() => Array(trueSize).fill("W"));
                    for (let row = 1; row < trueSize; row += 2) {
                        for (let col = 1; col < trueSize; col += 2) {
                            BASE_MAZE[row][col] = "R";
                        };
                    };
                    return(BASE_MAZE);
                };
                function GetVisitable(row, col) {
                    const VISITABLE = [];
                    for (let index = 0; index < MOVE_DETLA.length; index++) {
                        let newRow = row + MOVE_DETLA[index].detlaRow;
                        let newCol = col + MOVE_DETLA[index].detlaCol;
                        let toRoadRow = row + MOVE_DETLA[index].toRoadDR;
                        let toRoadCol = col + MOVE_DETLA[index].toRoadDC;
                        if (newRow > 0 && newRow < trueSize-1 && newCol > 0 && newCol < trueSize-1 && !VISITED_CALL[newRow][newCol]) {
                            VISITABLE.push({row: newRow, col: newCol, toRoadRow: toRoadRow, toRoadCol: toRoadCol})
                        };
                    };
                    return(VISITABLE);
                };
                function VisitCall(row, col, toRoadRow, toRoadCol) {
                    CREATE_STEAK.push({row: row, col: col});
                    BASE_MAZE[toRoadRow][toRoadCol] = "R";
                    VISITED_CALL[row][col] = true;
                };
                let trueSize = size * 2 + 1;
                const BASE_MAZE = CreateBaseMaze();
                const VISITED_CALL = Array(trueSize).fill().map(() => Array(trueSize).fill(false));
                const MOVE_DETLA = [
                    {detlaRow: 0, detlaCol: 2, toRoadDR: 0, toRoadDC: 1},
                    {detlaRow: 2, detlaCol: 0, toRoadDR: 1, toRoadDC: 0},
                    {detlaRow: 0, detlaCol: -2, toRoadDR: 0, toRoadDC: -1},
                    {detlaRow: -2, detlaCol: 0, toRoadDR: -1, toRoadDC: 0},
                ];
                const CREATE_STEAK = [{row: 1, col: 1}]
                VISITED_CALL[1][1] = true;
                while (CREATE_STEAK.length > 0) {
                    let nowRow, nowCol, SteakIndex;
                    if (Math.random() < randomRate) {
                        SteakIndex = Math.floor(Math.random() * CREATE_STEAK.length);
                        nowRow = CREATE_STEAK[SteakIndex].row;
                        nowCol = CREATE_STEAK[SteakIndex].col;
                    } else {
                        SteakIndex = CREATE_STEAK.length - 1;
                        nowRow = CREATE_STEAK[SteakIndex].row;
                        nowCol = CREATE_STEAK[SteakIndex].col;
                    };
                    const VISITABLE = GetVisitable(nowRow, nowCol);
                    if (VISITABLE.length == 0) {
                        CREATE_STEAK.splice(SteakIndex, 1);
                    } else {
                        let rngVisitable = Math.floor(Math.random() * VISITABLE.length);
                        VisitCall(VISITABLE[rngVisitable].row, VISITABLE[rngVisitable].col, VISITABLE[rngVisitable].toRoadRow, VISITABLE[rngVisitable].toRoadCol)
                    };
                };
                BASE_MAZE[1][0] = "S";
                BASE_MAZE[trueSize-2][trueSize-1] = "E";
                return BASE_MAZE;
            };
            function DrowMaze(maze) {
                ctx.clearRect(0, 0, game_canvas.width, game_canvas.height);
                let colWidth = 750 / maze[0].length;
                let rowHeight = 750 / maze.length;
                for (let row = 0; row < maze.length; row++) {
                    for (let col = 0; col < maze[row].length; col++) {
                        switch (maze[row][col]) {
                            case "W":
                                ctx.drawImage(Well_Img, Math.round(col*colWidth), Math.round(row*rowHeight), Math.ceil(colWidth), Math.ceil(rowHeight));
                                break;
                            case "R":
                                ctx.drawImage(Road_Img, Math.round(col*colWidth), Math.round(row*rowHeight), Math.ceil(colWidth), Math.ceil(rowHeight));
                                break;
                            case "S":
                                ctx.drawImage(Start_Img, Math.round(col*colWidth), Math.round(row*rowHeight), Math.ceil(colWidth), Math.ceil(rowHeight));
                                break;
                            case "E":
                                ctx.drawImage(End_Img, Math.round(col*colWidth), Math.round(row*rowHeight), Math.ceil(colWidth), Math.ceil(rowHeight));
                                break;
                            default:
                                break;
                        };
                    };
                };
                ctx.drawImage(User_Img, userCol*colWidth, userRow*rowHeight, colWidth, rowHeight);
            };
            function toMoveUser(e) {
                function MoveUser(dRow, dCol) {
                    if (MAZE[userRow+dRow][userCol+dCol] != "W" && userRow+dRow >= 0 && userRow+dRow < MAZE.length && userCol+dCol >= 0 && userCol+dCol < MAZE[0].length) {
                            userRow += dRow;
                            userCol += dCol;
                        };
                        DrowMaze(MAZE)
                };
                if (e.key != "F12") {
                    e.preventDefault();
                }
                switch (e.key) {
                    case 'W':
                    case 'w':
                    case 'ArrowUp':
                        MoveUser(-1, 0);
                        break;
                    case 'S':
                    case 's':
                    case 'ArrowDown':
                        MoveUser(1, 0);
                        break;
                    case 'A':
                    case 'a':
                    case 'ArrowLeft':
                        MoveUser(0, -1);
                        break;
                    case 'D':
                    case 'd':
                    case 'ArrowRight':
                        MoveUser(0, 1);
                        break;
                    default:
                        break;
                };
                if (userRow == MAZE.length-2 && userCol == MAZE[0].length-1) {
                    ctx.fillStyle = "#ffdd0080"
                    ctx.fillRect(175, 315, 400, 120)
                    ctx.fillStyle = "#00000080"
                    ctx.fillText("恭喜通關！", 377, 377);
                    ctx.fillStyle = "#000000ff"
                    ctx.fillText("恭喜通關！", 375, 375);
                    window.removeEventListener('keydown', toMoveUser);
                    reset_btn.removeEventListener('click', ResetUser);
                };
            };
            function ResetUser() {
                userCol = 0;
                userRow = 1;
                DrowMaze(MAZE);
            };

            let mazeSize = 15;
            let randomRate = 0.5;
            let userCol = 0;
            let userRow = 1;

            let MAZE = CreateRandomMaze(mazeSize, randomRate);
            DrowMaze(MAZE);

            create_btn.addEventListener('click', () => {
                MAZE = CreateRandomMaze(mazeSize, randomRate);
                window.removeEventListener('keydown', toMoveUser);
                window.addEventListener('keydown', toMoveUser);
                reset_btn.removeEventListener('click', ResetUser);
                reset_btn.addEventListener('click', ResetUser);
                ResetUser();
            });
            reset_btn.addEventListener('click', ResetUser);

            let startDropX;
            maze_size_bar.addEventListener('mousedown', (e) => {
                function DropValue(e) {
                    nowValue = Math.max(5, Math.min(30, Math.round(mazeSize + (e.x - startDropX) / 6)));
                    maze_size_bar.textContent = `迷宮尺寸: ${nowValue}`;
                    nowRange = (nowValue - 5) / 25 * 100;
                    maze_size_bar.style.background = `linear-gradient(to right, #00a0ffff ${nowRange}%, #80808033 ${nowRange}%)`;
                };
                function SetValue(e) {
                    maze_size_bar.textContent = `迷宮尺寸: ${nowValue}`;
                    maze_size_bar.style.background = `linear-gradient(to right, #00a0ffff ${nowRange}%, #80808033 ${nowRange}%)`;
                    mazeSize = nowValue
                    maze_size_bar.removeEventListener('mousemove', DropValue);
                    maze_size_bar.removeEventListener('mouseup', SetValue);
                    random_rate_bar.removeEventListener('mouseleave', SetValue);
                };
                let nowValue;
                let nowRange;
                startDropX = e.x;
                maze_size_bar.addEventListener('mousemove', DropValue);
                maze_size_bar.addEventListener('mouseup', SetValue);
                maze_size_bar.addEventListener('mouseleave', SetValue);
            });
            random_rate_bar.addEventListener('mousedown', (e) => {
                function DropValue(e) {
                    nowValue = Math.max(0, Math.min(1, (randomRate + (e.x - startDropX) / 200).toFixed(1)));
                    random_rate_bar.textContent = `Random rate: ${nowValue}`;
                    nowRange = nowValue * 100;
                    random_rate_bar.style.background = `linear-gradient(to right, #00a0ffff ${nowRange}%, #80808033 ${nowRange}%)`;
                };
                function SetValue(e) {
                    random_rate_bar.textContent = `Random rate: ${nowValue}`;
                    random_rate_bar.style.background = `linear-gradient(to right, #00a0ffff ${nowRange}%, #80808033 ${nowRange}%)`;
                    randomRate = nowValue
                    random_rate_bar.removeEventListener('mousemove', DropValue);
                    random_rate_bar.removeEventListener('mouseup', SetValue);
                    random_rate_bar.removeEventListener('mouseleave', SetValue);
                };
                let nowValue;
                let nowRange;
                startDropX = e.x;
                random_rate_bar.addEventListener('mousemove', DropValue);
                random_rate_bar.addEventListener('mouseup', SetValue);
                random_rate_bar.addEventListener('mouseleave', SetValue);
            });

            window.addEventListener('keydown', toMoveUser);
        }, 100);
    </script>
</body>
</html>
