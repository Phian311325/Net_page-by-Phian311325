<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>筆記</title>
    <link rel="icon" href="./image/書.png" type="image">
    <style>
        * {
            font-family: 'Noto Sans TC', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
            line-height: 1.5;
            color: #220044ff;
        }
        /* 版面配置 — 保留原有 Grid 風格 */
        .Background {
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 100vh;
            grid-template-areas: 'Contents_Table The_Content';
            background-color: #8000ffff;
            padding: 0;
            margin: 0;
            height: 100vh;
            gap: 2px;
        }
        .Contents-Table {
            grid-area: Contents_Table;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto 1fr;
            grid-template-areas: 'Table_Inv_Btn' 'Table_Name' 'Table_Content';
            background-color: #ffffffff;
            padding: 4px;
            overflow: hidden;
        }
        .Table-Invisible-Btn {
            grid-area: Table_Inv_Btn;
            display: none;
            background-color: #e6ccffff;
            border: 1px solid #8000ffff;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            padding: 6px;
            transition: 0.2s;
        }
        .Table-Invisible-Btn:hover {
            background-color: #d5b8ff;
        }
        .Table-Name {
            grid-area: Table_Name;
        }
        .Table-Centent {
            grid-area: Table_Content;
            height: 100%;
            padding: 0;
            padding-top: 4px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .The-Content {
            grid-area: The_Content;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            grid-template-areas: 'Web_Name' 'Centent_Centent';
            background-color: #ffffffff;
            padding: 4px;
        }
        .Web-Name {
            grid-area: Web_Name;
        }
        .Centent-Centent {
            grid-area: Centent_Centent;
            height: 100%;
            overflow-y: auto;
            padding-right: 4px;
        }
        /* 標題樣式 (正文) */
        h1 {
            font-size: 32px;
            margin: 4px;
            margin-top: 12px;
            padding: 0 4px;
            border-bottom: 2px solid #8000ffff;
        }
        h2 {
            font-size: 28px;
            margin: 4px;
            margin-top: 12px;
            padding: 0 4px;
            border-bottom: 1px solid #b366ffff;
            scroll-margin-top: 1.2rem;
        }
        h3 {
            font-size: 24px;
            margin: 4px;
            margin-top: 12px;
            padding: 0 4px;
            border-bottom: 1px solid #cc99ffff;
            scroll-margin-top: 1.2rem;
        }
        pr {
            display: block;
            margin: 0 4px;
            padding: 4px;
            border-bottom: 1px solid #e6ccffff;
        }
        h4 {
            font-size: 20px;
            margin: 4px;
            margin-top: 12px;
            padding: 0 4px;
            scroll-margin-top: 1rem;
        }
        div {
            padding: 0 4px;
        }
        st {
            font-weight: 700;
        }
        cd {
            font-family: 'Consolas', monospace;
            background-color: #eeddffff;
            padding: 0 2px;
            margin: 0 2px;
        }
        c {
            color: #8000ffff;
        }
        cr {
            display: block;
            background-color: #faf5ffff;
            border-left: 4px solid #b366ffff;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 16px;
        }
        qt {
            border-left: 2px solid #cc99ffff;
            padding: 0 8px;
            display: block;
            margin-top: 4px;
            margin-bottom: 16px;
            color: #3b0077ff;
        }
        bl {
            display: block;
            background-color: #eeddffff;
            border: 1px solid #8000ffff;
            font-family: 'Consolas', monospace;
            padding: 8px;
            margin: 4px 0;
            tab-size: 4;
            overflow-x: auto;
            line-height: 1.5;
        }
        b {
            display: inline-block;
            background-color: #000000ff;
            width: 1px;
            height: 1em;
            transform: translateY(2px);
            margin: 0 4px;
        }
        hr {
            border: 0.5px solid #e6ccffff;
        }
        /* 目錄連結基礎樣式 (保留原有風格 + 新增 active 高亮) */
        a.go {
            display: block;
            width: calc(100% - 8px);
            padding: 4px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        cd > a {
            font-family: 'Consolas', monospace;
        }
        /* 折疊相關包裝器 (折疊目錄組) */
        .toc-group {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        /* 折疊按鈕樣式 - 修改為垂直居中對齊連結欄 */
        .toggle-folder {
            position: absolute;
            left: 0;
            width: 24px;
            background: #f0e6ff;
            border: 1px solid #b366ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1;
            color: #3b0077ff;
            transition: 0.1s;
            margin: 0;
            box-sizing: border-box;
        }
        .toggle-folder.HI {
            height: 54px;
        }
        .toggle-folder.HII {
            height: 44px;
        }
        .toggle-folder.HIII {
            height: 36px;
        }
        .toggle-folder.Pr {
            height: 24px;
        }
        /* 目錄項整體容器調整，加入虛線邊框（底部虛線填滿） */
        .toc-item-wrapper {
            position: relative;
            padding: 0;
        }
        .toggle-folder:hover {
            background: #d5b8ff;
        }
        /* 折疊的子目錄容器 (預設展開) */
        .sub-toc {
            padding: 0;
            margin-left: 12px;
            padding-left: 11px;
            border-left: 1px dashed #cc99ff;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
        }
        .sub-toc.collapsed {
            display: none; /* 完全隱藏子節點 */
        }
        /* 目錄連結調整位置 (留給折疊按鈕空間) */
        a {
            margin: 1px;
        }
        a.toc-link {
            margin-left: 24px;         /* 從 20px 改為 26px，給 24px 按鈕更多空間 */
            width: calc(100% - 32px);  /* 對應調整減去寬度 */
        }
        a.Header-I {
            font-weight: bold;
            font-size: 30px;
            height: 46px;
            background-color: #e6ccffff;
            padding-left: 8px;
            width: calc(100% - 44px);
        }
        a.Header-I:hover {
            background-color: #d5aaffff;
            width: calc(100% - 52px);
            padding-left: 16px;
        }
        a.Header-II {
            font-weight: bold;
            font-size: 24px;
            background-color: #eeddffff;
            height: 36px;
            padding-left: 8px;
            width: calc(100% - 44px);
        }
        a.Header-II:hover {
            background-color: #ddbbffff;
            width: calc(100% - 52px);
            padding-left: 16px;
        }
        a.Header-III {
            font-weight: bold;
            font-size: 19px;
            background-color: #f7eeffff;
            height: 28px;
            width: calc(100% - 44px);
            padding-left: 8px;
        }
        a.Header-III:hover {
            background-color: #e6ccffff;
            padding-left: 16px;
            width: calc(100% - 52px);
        }
        a.Paragraph {
            font-size: 16px;
            padding: 0 4px;
            height: 25.5px;
            width: calc(100% - 44px);
            padding-left: 8px;
        }
        a.Paragraph:hover {
            background-color: #eeddffff;
            padding-left: 16px;
            width: calc(100% - 52px);
        }
        /* 活躍高亮 */
        a.active {
            background-color: #d5b0ffff !important;
            color: #8000ffff !important;
            border-left: 4px solid #4a00a0;
            font-weight: bold;
        }
        a.Header-I.active::before,
        a.Header-II.active::before,
        a.Header-III.active::before,
        a.Paragraph.active::before {
            filter: brightness(1.2);
        }
        /* 表格與列表 */
        table {
            background-color: #8000ffff;
            border-spacing: 1px;
            border: none;
            margin: 4px 0;
        }
        th, td {
            background-color: #ffffffff;
            padding: 4px 8px;
        }
        th {
            background-color: #eeddffff;
        }
        ul, ol {
            padding-left: 32px;
            margin: 4px 0;
        }
        ul li {
            list-style: '— ';
        }
        /* 自適應 (移動端) */
        @media (max-width: 800px) {
            .Background {
                grid-template-columns: 100%;
                grid-template-rows: calc(60vh - 2px) 40vh;
                grid-template-areas: 'The_Content' 'Contents_Table';
            }
            .Background.Table-Invisible {
                grid-template-rows: calc(100vh - 34px) 32px;
            }
            .Table-Centent {
                height: 100%;
            }
            .Invisible {
                display: none;
            }
            .Table-Invisible-Btn {
                display: block;
            }
            a.Header-I:hover {
                background-color: #e6ccffff;
                width: calc(100% - 28px);
                padding-left: 8px;
            }
            a.Header-II:hover {
                background-color: #eeddffff;
                width: calc(100% - 20px);
                padding-left: 8px;
            }
            a.Header-III:hover {
                background-color: #f7eeffff;
                padding-left: 8px;
                width: calc(100% - 12px);
            }
            a.Paragraph:hover {
                background-color: #ffffffff;
                padding-left: 8px;
                width: calc(100% - 4px);
            }
            h1, h2, h3, h4 {
                scroll-margin-top: 0.8rem;
            }
        }
        .Centent-Centent::-webkit-scrollbar,
        .Table-Centent::-webkit-scrollbar {
            width: 5px;
        }
        .Centent-Centent::-webkit-scrollbar-track,
        .Table-Centent::-webkit-scrollbar-track {
            background: #f1eaff;
        }
        .Centent-Centent::-webkit-scrollbar-thumb,
        .Table-Centent::-webkit-scrollbar-thumb {
            background: #c09eff;
        }
        .Web-Name {
            font-size: 32px;
            background-color: #8000ffff;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            padding: 0 16px;
            margin: 0;
        }
    </style>
</head>
<body class="Background" id="background">
    <div class="Contents-Table">
        <button class="Table-Invisible-Btn" id="table-invisivle-btn">▼隱藏目錄▼</button>
        <h1 class="Table-Name" id="table-name" style="margin: 0;">目錄</h1>
        <div class="Table-Centent" id="table-centent">
            <div style="padding: 12px; text-align: center; color: #8a6ebb;">正在載入目錄...</div>
        </div>
    </div>
    <div class="The-Content">
        <!--≡≡≡≡≡≡≡≡≡≡≡≡≡筆記名稱↓筆記名稱≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡≡-->
        <h1 class="Web-Name">筆記</h1>
        <div class="Centent-Centent" id="dynamicContentZone">
            <!--≡≡≡≡≡≡≡≡≡≡≡≡≡↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓筆記正文↓≡≡≡≡≡≡≡≡≡≡≡≡≡-->
<h1>標題壹</h1>
            <h2>標題貳</h2>
            <h3>標題參</h3>
            <h4>區段</h4>
            <pr>
                段落（取代&lt;p&gt;）<br>
                文字、<st>粗體（取代&lt;strong&gt;）</st>、<i>斜體</i>、<s>刪除</s>、<c>顏色</c>、分隔符→<b></b><cd>代碼</cd>、小於符號&lt;、大於符號&gt;、和號&amp;
                <ul>
                    <li>無</li>
                    <li>序</li>
                    <li>列</li>
                    <li>表</li>
                </ul>
                <ol>
                    <li>有</li>
                    <li>序</li>
                    <li>列</li>
                    <li>表</li>
                </ol>
                ↓橫隔條
                <hr>
                <bl>
                    仍然需要<br>
                    使用&lt;br&gt;<br>
                    手動換行<br>
                    的代碼塊
                </bl>
                <cr>
                    提示卡
                </cr>
                <qt>
                    引用
                </qt>
                <table>
                    <tr>
                        <th>尺</th>
                        <th>寸</th>
                        <th>三</th>
                    </tr>
                    <tr>
                        <td>乘</td>
                        <td>以</td>
                        <td>三</td>
                    </tr>
                    <tr>
                        <td>的</td>
                        <td>表</td>
                        <td>格</td>
                    </tr>
                </table>
            </pr>
            <!--≡≡≡≡≡≡≡≡≡≡≡≡≡↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑筆記正文↑≡≡≡≡≡≡≡≡≡≡≡≡≡-->
            <div style="height: 80vh;"></div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- DOM 元素 ----------
            const contentZone = document.getElementById('dynamicContentZone');
            const tocContainer = document.getElementById('table-centent');
            const mainScrollArea = document.querySelector('.Centent-Centent');
            const sidebarScrollArea = document.querySelector('.Table-Centent');

            let headingElements = [];      // { element, level }
            let headingToLinkMap = new Map();

            // ---------- 輔助函數 ----------
            function generateIdFromText(text) {
                let base = text.trim().substring(0, 50);
                base = base.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '-');
                base = base.replace(/-+/g, '-').replace(/^-|-$/g, '');
                if (base === '') base = 'heading';
                return base + '-' + Math.random().toString(36).substr(2, 6);
            }

            function prepareHeadings() {
                if (!contentZone) return [];
                const headings = Array.from(contentZone.querySelectorAll('h1, h2, h3, h4'));
                headings.forEach(heading => {
                    if (!heading.id || heading.id.trim() === '') {
                        let rawText = heading.innerText.trim() || 'section';
                        let newId = generateIdFromText(rawText);
                        heading.id = newId;
                    }
                });
                return headings;
            }

            function getLinkClassByTagName(tagName) {
                if (tagName === 'H1') return 'Header-I';
                if (tagName === 'H2') return 'Header-II';
                if (tagName === 'H3') return 'Header-III';
                if (tagName === 'H4') return 'Paragraph';
                return 'Paragraph';
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // 清除高亮
            function clearActiveClass() {
                if (!tocContainer) return;
                const activeLinks = tocContainer.querySelectorAll('a.active');
                activeLinks.forEach(link => link.classList.remove('active'));
            }

            function setActiveHeading(headingElement) {
                if (!headingElement) return;
                const link = headingToLinkMap.get(headingElement);
                if (link && !link.classList.contains('active')) {
                    clearActiveClass();
                    link.classList.add('active');
                    if (sidebarScrollArea && link) {
                        const linkRect = link.getBoundingClientRect();
                        const containerRect = sidebarScrollArea.getBoundingClientRect();
                        if (linkRect.top < containerRect.top || linkRect.bottom > containerRect.bottom) {
                            link.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }
                }
            }

            // 滾動高亮邏輯：找出目前位置向上（滾動容器頂部以上）最近的那個標題
            function updateActiveByScroll() {
                if (!mainScrollArea || headingElements.length === 0) return;
                const scrollContainer = mainScrollArea;
                const containerTop = scrollContainer.scrollTop;
                
                let activeHeading = null;
                // 從頭開始找，最後一個 offsetTop <= containerTop + 偏移 的標題即為「向上的最近標題」
                for (let i = 0; i < headingElements.length; i++) {
                    const heading = headingElements[i].element;
                    const offsetTop = heading.offsetTop;
                    // 如果標題的頂端位置小於或等於目前滾動位置+5px緩衝，就更新為當前標題
                    // 這樣滾動超過標題後，該標題仍保持高亮，直到遇到下一個標題
                    if (offsetTop <= containerTop + 80) {
                        activeHeading = heading;
                    } else {
                        // 一旦遇到 offsetTop 大於滾動位置的標題，就停止搜尋
                        break;
                    }
                }
                
                // 兜底：如果沒有任何標題符合（例如在最頂端），則高亮第一個標題
                if (!activeHeading && headingElements.length > 0) {
                    activeHeading = headingElements[0]?.element;
                }
                
                if (activeHeading) {
                    setActiveHeading(activeHeading);
                }
            }

            let scrollTicking = false;
            function onScrollHandler() {
                if (!scrollTicking) {
                    requestAnimationFrame(() => {
                        updateActiveByScroll();
                        scrollTicking = false;
                    });
                    scrollTicking = true;
                }
            }

            // ---------- 折疊邏輯 (基於樹狀目錄結構) ----------
            // 遞迴建立目錄樹: 得到層級嵌套的 nodes
            function buildTocTree(headingsRaw) {
                // headingsRaw: [{ element, level, linkClass, title, id }]
                const stack = [];
                const root = [];

                for (let node of headingsRaw) {
                    const levelNum = { H1:1, H2:2, H3:3, H4:4 }[node.level] || 4;
                    const newNode = { ...node, children: [], levelNum };
                    while (stack.length && stack[stack.length-1].levelNum >= levelNum) {
                        stack.pop();
                    }
                    if (stack.length === 0) {
                        root.push(newNode);
                    } else {
                        stack[stack.length-1].children.push(newNode);
                    }
                    stack.push(newNode);
                }
                return root;
            }

            // 渲染折疊式目錄 HTML (遞迴)
            function renderTocWithFold(rootNodes, level = 0) {
                if (!rootNodes.length) return '';
                let html = '';
                for (let node of rootNodes) {
                    const hasChildren = node.children && node.children.length > 0;
                    const isParent = (node.level === 'H1' || node.level === 'H2' || node.level === 'H3');  // H1/H2/H3 可折疊子層
                    const toggleId = `toggle-${node.id}`;
                    const subContainerId = `sub-${node.id}`;
                    
                    // 渲染當前節點的連結
                    html += `<div class="toc-item-wrapper" data-heading-id="${node.id}">`;
                    // 在 renderTocWithFold 函數內，判斷 isParent 後產生按鈕的部分
                    if (hasChildren && isParent) {
                        // 決定按鈕的層級 class
                        let levelClass = '';
                        if (node.level === 'H1') levelClass = 'HI';
                        else if (node.level === 'H2') levelClass = 'HII';
                        else if (node.level === 'H3') levelClass = 'HIII';
                        // 加入對應的 class
                        html += `<span class="toggle-folder ${levelClass}" data-toggle="fold" data-target="${subContainerId}" data-expanded="true">▼</span>`;
                    } else {
                        html += `<span class="toggle-folder" data-toggle="fold" data-target="${subContainerId}" data-expanded="true">●</span>`;
                    }
                    html += `<a class="go toc-link ${node.linkClass}" data-heading-id="${node.id}" href="#${node.id}">${escapeHtml(node.title)}</a>`;
                    
                    if (hasChildren && isParent) {
                        html += `<div id="${subContainerId}" class="sub-toc">`;
                        html += renderTocWithFold(node.children, level+1);
                        html += `</div>`;
                    } else if (hasChildren && !isParent) {
                        // H4 有孩子理論上不會發生，但安全起見直接展子層
                        html += `<div class="sub-toc" style="margin-left:12px;">`;
                        html += renderTocWithFold(node.children, level+1);
                        html += `</div>`;
                    }
                    html += `</div>`;
                }
                return html;
            }

            // 綁定折疊按鈕事件
            function bindFoldEvents() {
                const toggleButtons = document.querySelectorAll('.toggle-folder');
                toggleButtons.forEach(btn => {
                    btn.removeEventListener('click', foldHandler);
                    btn.addEventListener('click', foldHandler);
                });
            }

            function foldHandler(e) {
                e.stopPropagation();
                const btn = e.currentTarget;
                const targetId = btn.getAttribute('data-target');
                const subContainer = document.getElementById(targetId);
                if (!subContainer) return;
                const isExpanded = btn.getAttribute('data-expanded') === 'true';
                if (isExpanded) {
                    subContainer.classList.add('collapsed');
                    btn.setAttribute('data-expanded', 'false');
                    btn.textContent = '▶';
                } else {
                    subContainer.classList.remove('collapsed');
                    btn.setAttribute('data-expanded', 'true');
                    btn.textContent = '▼';
                }
                // 折疊後觸發一次滾動重繪，避免高亮錯誤 (非必要但美觀)
                setTimeout(() => updateActiveByScroll(), 50);
            }

            // 主目錄建構 (折疊版本)
            function buildDynamicTOC() {
                if (!contentZone || !tocContainer) return;
                const rawHeadingEls = prepareHeadings();
                if (rawHeadingEls.length === 0) {
                    tocContainer.innerHTML = '<div style="padding: 12px; text-align:center;">📭 暫無標題</div>';
                    headingElements = [];
                    headingToLinkMap.clear();
                    return;
                }
                
                // 建立節點資料
                const nodesData = [];
                rawHeadingEls.forEach(el => {
                    nodesData.push({
                        element: el,
                        level: el.tagName,
                        linkClass: getLinkClassByTagName(el.tagName),
                        title: el.innerText.trim() || '(未命名)',
                        id: el.id,
                    });
                });
                
                // 建樹
                const tree = buildTocTree(nodesData);
                const tocHtml = renderTocWithFold(tree);
                tocContainer.innerHTML = tocHtml;
                
                // 重新綁定連結點擊與折疊按鈕
                const allLinks = tocContainer.querySelectorAll('a.toc-link');
                headingToLinkMap.clear();
                const validHeadings = [];
                
                // 在 buildDynamicTOC 函數中，找到點擊事件綁定的部分，修改 scrollTo 行為：
                allLinks.forEach(link => {
                    const headingId = link.getAttribute('data-heading-id');
                    if (headingId) {
                        const targetElem = document.getElementById(headingId);
                        if (targetElem) {
                            headingToLinkMap.set(targetElem, link);
                            validHeadings.push({ element: targetElem, level: targetElem.tagName });
                            
                            link.addEventListener('click', (e) => {
                                e.preventDefault();
                                const elem = document.getElementById(headingId);
                                if (elem && mainScrollArea) {
                                    // 直接對齊上緣，減去 0 或微調 2px 確保緊貼頂部
                                    const targetTop = elem.offsetTop;
                                    mainScrollArea.scrollTo({
                                        top: targetTop - 60,     // 改為 0 偏移，直接對齊上緣
                                        behavior: 'smooth'
                                    });
                                    clearActiveClass();
                                    link.classList.add('active');
                                    setTimeout(() => updateActiveByScroll(), 200);
                                } else if (elem) {
                                    elem.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                    clearActiveClass();
                                    link.classList.add('active');
                                }
                            });
                        }
                    }
                });
                
                headingElements = validHeadings;
                bindFoldEvents();   // 綁定折疊按鈕
                
                if (mainScrollArea) {
                    setTimeout(() => updateActiveByScroll(), 80);
                }
            }
            
            // 監聽正文變化自動重建目錄 (保留折疊狀態將被重置，但符合預期)
            let rebuildTimer;
            function debounceRebuild() {
                if (rebuildTimer) clearTimeout(rebuildTimer);
                rebuildTimer = setTimeout(() => {
                    buildDynamicTOC();
                }, 200);
            }
            
            let observer = null;
            function initMutationObserver() {
                if (!contentZone) return;
                if (observer) observer.disconnect();
                observer = new MutationObserver((mutations) => {
                    let needRebuild = false;
                    for (let mut of mutations) {
                        if (mut.type === 'childList') {
                            const added = Array.from(mut.addedNodes);
                            const removed = Array.from(mut.removedNodes);
                            if (added.some(n => n.nodeType === 1 && (n.matches?.('h1,h2,h3,h4') || n.querySelector?.('h1,h2,h3,h4'))) ||
                                removed.some(n => n.nodeType === 1 && (n.matches?.('h1,h2,h3,h4') || n.querySelector?.('h1,h2,h3,h4')))) {
                                needRebuild = true;
                            }
                        }
                        if (mut.type === 'attributes' && (mut.attributeName === 'id')) needRebuild = true;
                    }
                    if (needRebuild) debounceRebuild();
                });
                observer.observe(contentZone, { childList: true, subtree: true, attributes: true, attributeFilter: ['id'] });
            }
            
            function bindScrollListener() {
                if (mainScrollArea) {
                    mainScrollArea.addEventListener('scroll', onScrollHandler);
                    window.addEventListener('resize', () => setTimeout(updateActiveByScroll, 100));
                } else {
                    window.addEventListener('scroll', onScrollHandler);
                }
            }
            
            // 隱藏/顯示目錄 (原有)
            const background = document.getElementById('background');
            const tableInvisivleBtn = document.getElementById('table-invisivle-btn');
            const tableName = document.getElementById('table-name');
            const tableCentent = document.getElementById('table-centent');
            let isTableInvisible = false;
            if (tableInvisivleBtn) {
                tableInvisivleBtn.addEventListener('click', () => {
                    if (!isTableInvisible) {
                        isTableInvisible = true;
                        tableName.classList.add('Invisible');
                        tableCentent.classList.add('Invisible');
                        background.classList.add('Table-Invisible');
                        tableInvisivleBtn.textContent = '▲顯示目錄▲';
                    } else {
                        isTableInvisible = false;
                        tableName.classList.remove('Invisible');
                        tableCentent.classList.remove('Invisible');
                        background.classList.remove('Table-Invisible');
                        tableInvisivleBtn.textContent = '▼隱藏目錄▼';
                    }
                });
            }
            
            function init() {
                buildDynamicTOC();
                bindScrollListener();
                initMutationObserver();
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
