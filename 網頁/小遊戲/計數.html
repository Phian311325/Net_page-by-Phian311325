<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計數</title>
    <style>
        * {
            font-family: "Noto Sans TC";
        }
        .Game-Area {
            display: grid;
            gap: 4px;
            justify-items: center;
        }
        .Const-Lbl {
            font-size: 24px;
        }
        #count-dsp {
            font-size: 48px;
        }
        button {
            display: block;
            border: 2px solid #888888ff;
            transition: all 150ms ease;
        }
        #count-btn {
            font-size: 18px;
            padding: 4px 20px;
        }
        #count-btn:hover {
            background-color: #ddddddff;
        }
        #reset-btn {
            font-size: 14px;
            padding: 3px 6px;
        }
        #reset-btn:hover {
            background-color: #ddddddff;
        }
    </style>
</head>
<body>
    <div class="Game-Area">
        <div class="Const-Lbl">當前計數</div>
        <div id="count-dsp">0</div>
        <button id="count-btn">計數</button>
        <button id="reset-btn">重置</button>
    </div>
    <script>
        const count_dsp = document.getElementById('count-dsp');
        const count_btn = document.getElementById('count-btn');
        const reset_btn = document.getElementById('reset-btn');
        let count = 0;
        count_btn.addEventListener('click', () => {
            count++;
            count_dsp.textContent = count;
        });
        reset_btn.addEventListener('click', () => {
            count = 0;
            count_dsp.textContent = count;
        });
    </script>
</body>
</html>
