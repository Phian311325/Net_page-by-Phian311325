<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>記憶翻牌</title>
    <style>
        * {
            font-size: 24px;
            font-family: "Noto Sans TC";
            line-height: 1;
        }
        body {
            display: grid;
            justify-items: center;
            gap: 8px;
        }
        .Card-Grid {
            display: grid;
            grid-template-columns: min(100px, 20vw) min(100px, 20vw) min(100px, 20vw) min(100px, 20vw);
            grid-template-rows: min(150px, 30vw) min(150px, 30vw) min(150px, 30vw) min(150px, 30vw);
            gap: 8px;
            margin: 16px;
        }
        .Card {
            background-color: #eeeeeeff;
            border: 2px solid #888888ff;
            border-radius: 12px;
            text-align: center;
            align-content: center;
            font-size: 56px;
            transition: all 150ms ease;
        }
        .Card:hover {
            background-color: #ddddddff;
        }
        .Match-Dsp {
            font-size: 56px;
        }
        .Complete-Lbl {
            display: none;
            text-align: center;
        }
        .Complete-Title {
            font-size: 32px;
        }
        .Complete-Hint {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div>當前配對次數</div>
    <div class="Match-Dsp" id="match-dsp">0</div>
    <div class="Card-Grid" id="game-area">
        <div class="Card" id="0">
        </div>
        <div class="Card" id="1">
        </div>
        <div class="Card" id="2">
        </div>
        <div class="Card" id="3">
        </div>
        <div class="Card" id="4">
        </div>
        <div class="Card" id="5">
        </div>
        <div class="Card" id="6">
        </div>
        <div class="Card" id="7">
        </div>
        <div class="Card" id="8">
        </div>
        <div class="Card" id="9">
        </div>
        <div class="Card" id="10">
        </div>
        <div class="Card" id="11">
        </div>
        <div class="Card" id="12">
        </div>
        <div class="Card" id="13">
        </div>
        <div class="Card" id="14">
        </div>
        <div class="Card" id="15">
        </div>
    </div>
    <div class="Complete-Lbl" id="complete-lbl">
        <div class="Complete-Title">記憶翻牌已完成</div>
        <div class="Complete-Hint">點擊此行文字即可重置</div>
    </div>
    <script>
        //生成包含 '1' ~ '8' 各一對的數組
        function GenerateCardLayout() {
            let layout = ['0', '0'];
            for (let item = 1; item < 8; item++) {
                let index;
                index = Math.floor(Math.random()*(layout.length+1));
                layout = AddToIndex(item, index, layout);
                index = Math.floor(Math.random()*(layout.length+1));
                layout = AddToIndex(item, index, layout);
            };
            return layout;
        };
        //在 array[] 的第 index 項插入 object，後續項順勢後移
        function AddToIndex(object, index, array) {
            for (let i = array.length-1; i >= index; i--) {
                array[i+1] = array[i];
            };
            array[index] = object;
            return array;
        };
        //主程序
        let cardsValue = GenerateCardLayout(); //卡牌的牌值
        let cardsDom = []; //卡牌的 Dom 元素
        let openedCardsDom = []; //打開之卡的 Dom 元素
        let openedCardsValue = []; //打開之卡的牌值
        let match = 0; //配對次數
        let Complete = 0; //完成的牌數
        for (let card = 0; card < 16; card++) {
            function OpenCard() {
                //打開卡牌時顯示牌值
                cardsDom[card].style.pointerEvents = 'none'; //防止打開已經打開的牌
                cardsDom[card].textContent = cardsValue[card];
                openedCardsDom.push(cardsDom[card]);
                openedCardsValue.push(cardsValue[card]);
                if (openedCardsDom.length == 2) {
                    //有兩張牌打開時計數並判定是否一樣
                    match++;
                    document.getElementById('match-dsp').textContent = match;
                    if (openedCardsValue[0] == openedCardsValue[1]) {
                        //一樣時標為完成
                        Complete += 2;
                        openedCardsDom = [];
                        openedCardsValue = [];
                        if (Complete == 16) {
                            //全部完成時通關
                            document.getElementById('complete-lbl').style.display = 'inline';
                        };
                    } else {
                        //防止在揭示時翻牌
                        let game = document.getElementById('game-area');
                        game.style.pointerEvents = 'none'; 
                        setTimeout(() => {
                            ////不一樣時揭示 500 毫秒便蓋回
                            openedCardsDom[0].textContent = openedCardsDom[1].textContent = "";
                            //讓這兩張牌恢復能打開
                            openedCardsDom[0].style.pointerEvents = '';
                            openedCardsDom[1].style.pointerEvents = '';
                            openedCardsDom = [];
                            openedCardsValue = [];
                            game.style.pointerEvents = 'all';
                        }, 500);
                    };
                };
            };
            //開牌監聽
            cardsDom[card] = document.getElementById(`${card}`);
            cardsDom[card].addEventListener('click', OpenCard);
        };
        document.getElementById('complete-lbl').addEventListener('click', () => {
            //重置顯示
            for (let card = 0; card < 16; card++) {
                cardsDom[card].textContent = '';
                cardsDom[card].style.pointerEvents = '';
            }
            document.getElementById('match-dsp').textContent = 0;
            //重置變數
            cardsValue = GenerateCardLayout();
            openedCardsDom = [];
            openedCardsValue = [];
            match = 0;
            Complete = 0;
            document.getElementById('complete-lbl').style.display = 'none';
        });
    </script>
</body>
</html>
